<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 근무 시간 로그 컨버터</title>
    <!-- Chart.js CDN 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
            --radius: 8px;
            --mono-font: 'Menlo', 'Monaco', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Config */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .header-top {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f1f5f9;
        }

        .header-config {
            padding: 0.75rem 2rem;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        h1 { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .badge-ai { background: linear-gradient(135deg, #6366f1, #ec4899); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; vertical-align: middle; }

        .api-input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            max-width: 600px;
        }
        .api-input-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-light); white-space: nowrap; }
        .api-input-group input {
            flex: 1;
            padding: 0.4rem 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.85rem;
            background: white;
        }

        main {
            flex: 1;
            display: flex;
            padding: 1rem;
            gap: 1rem;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            main { flex-direction: column; overflow: auto; }
            .header-config { padding: 1rem; flex-direction: column; align-items: stretch; }
        }

        /* Panels */
        .panel {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .panel-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            background: #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body {
            flex: 1;
            overflow: auto;
            padding: 0;
            position: relative;
        }

        /* Input Area */
        textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            padding: 1rem;
            font-family: var(--mono-font);
            font-size: 14px;
            line-height: 1.6;
        }
        textarea:focus { outline: none; }

        /* Output Area */
        .json-output {
            padding: 1rem;
            white-space: pre-wrap;
            font-family: var(--mono-font);
            font-size: 13px;
            color: #334155;
        }

        /* Table View */
        .table-view {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .table-view th, .table-view td {
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            text-align: left;
        }
        .table-view th {
            background: #f8fafc;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        .tag {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            background: #e0e7ff;
            color: #3730a3;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 4px;
            margin-bottom: 2px;
        }

        /* Chart Area */
        .chart-container {
            padding: 1rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chart-wrapper {
            width: 100%;
            max-width: 800px;
            flex: 1;
            position: relative;
        }
        .total-summary {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            color: #1e3a8a;
            text-align: center;
            font-weight: 600;
        }

        /* Actions */
        .btn {
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .btn-outline {
            background: white;
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            border-radius: 4px;
        }
        .btn-outline:hover { background: #f1f5f9; }

        .tabs {
            display: flex;
            gap: 0.5rem;
        }
        .tab {
            padding: 0.25rem 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .tab.active {
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-weight: 600;
        }

        /* Overlay Loading */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(2px);
        }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .error-msg { color: #ef4444; padding: 1rem; font-size: 0.9rem; line-height: 1.5; }
        
        /* 요일 표시 스타일 */
        .day-badge {
            font-size: 0.8em;
            color: #64748b;
            margin-left: 4px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>
                🕒 AI 근무 시간 파서
                <span class="badge-ai">Gemini Powered</span>
            </h1>
            <button id="convert-btn" class="btn">
                <span>AI 변환 실행</span>
            </button>
        </div>
        <div class="header-config">
            <div class="api-input-group">
                <label for="api-key">Gemini API Key:</label>
                <input type="password" id="api-key" placeholder="AI Studio에서 발급받은 키를 입력하세요" autocomplete="off">
            </div>
            <div style="font-size: 0.8rem; color: #64748b;">
                * 키는 브라우저에만 저장됩니다.
            </div>
            <div id="model-info" style="font-size: 0.8rem; color: #64748b;">
                선택된 모델: <span id="model-name">-</span>
            </div>
        </div>
    </header>

    <main>
        <!-- 입력 패널 -->
        <section class="panel">
            <div class="panel-header">
                <span>입력 (Raw Text)</span>
                <button id="clear-btn" class="btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">지우기</button>
            </div>
            <div class="panel-body">
                <textarea id="input-text" placeholder="근무 기록을 자유롭게 입력하세요. (AI가 형식을 파악합니다)&#13;&#10;&#13;&#10;[예시]&#13;&#10;10,22 11:30 ~ 12:40 점심시간 제외하고 근무&#13;&#10;10월 22일 오후 2시부터 6시까지 회의&#13;&#10;10/23 09:00 - 12:00 오전 근무, 13:00 - 18:00 오후 근무"></textarea>
            </div>
        </section>

        <!-- 출력 패널 -->
        <section class="panel">
            <div class="panel-header">
                <div class="tabs">
                    <div class="tab active" data-view="json">JSON</div>
                    <div class="tab" data-view="table">테이블</div>
                    <div class="tab" data-view="chart">📈 차트</div>
                </div>
                <button id="copy-btn" class="btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">복사</button>
            </div>
            <div class="panel-body" id="output-container">
                <div style="padding: 2rem; text-align: center; color: #94a3b8;">
                    API 키를 입력하고 'AI 변환 실행'을 눌러주세요.
                </div>
            </div>
            
            <!-- 로딩 오버레이 -->
            <div id="loading-overlay" class="overlay hidden">
                <div class="spinner"></div>
                <div style="font-weight: 600; color: var(--text);">Gemini가 분석 중입니다...</div>
            </div>
        </section>
    </main>

    <script>
        const App = (() => {
            // DOM Elements
            const els = {
                input: document.getElementById('input-text'),
                outputContainer: document.getElementById('output-container'),
                convertBtn: document.getElementById('convert-btn'),
                clearBtn: document.getElementById('clear-btn'),
                copyBtn: document.getElementById('copy-btn'),
                tabs: document.querySelectorAll('.tab'),
                apiKeyInput: document.getElementById('api-key'),
                loadingOverlay: document.getElementById('loading-overlay'),
                modelName: document.getElementById('model-name')
            };

            // State
            let state = {
                parsedData: null,
                currentView: 'json',
                apiKey: '',
                isLoading: false,
                chartInstance: null,
                modelName: '',
                modelCheckedAt: 0
            };

            // --- 1. Initialization ---
            const init = () => {
                loadState();
                bindEvents();
            };

            const loadState = () => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    state.apiKey = savedKey;
                    els.apiKeyInput.value = savedKey;
                }

                // Show last selected model (cached) if available
                const cachedModel = localStorage.getItem(MODEL_CACHE_KEY);
                if (cachedModel) setModelLabel(cachedModel);

            };// --- Model Selection (Auto-latest) ---
// We cannot use a "latest" alias in the Gemini REST API.
// Instead, we fetch the model list and pick the newest *accessible* flash model (excluding preview).
const MODEL_CACHE_KEY = 'gemini_latest_flash_model';
const MODEL_CACHE_AT_KEY = 'gemini_latest_flash_model_checked_at';
const MODEL_CACHE_TTL_MS = 24 * 60 * 60 * 1000; // 24h

const parseVersionTuple = (name) => {
    // Extract all numeric parts and compare lexicographically, e.g. gemini-2.0-flash -> [2,0]
    const nums = (name.match(/\d+(?:\.\d+)*/g) || [])
        .flatMap(s => s.split('.').map(n => parseInt(n, 10)));
    return nums.length ? nums : [0];
};

const compareVersionTupleDesc = (a, b) => {
    const av = parseVersionTuple(a);
    const bv = parseVersionTuple(b);
    const len = Math.max(av.length, bv.length);
    for (let i = 0; i < len; i++) {
        const ai = av[i] ?? 0;
        const bi = bv[i] ?? 0;
        if (ai !== bi) return bi - ai; // desc
    }
    // If version equal, prefer shorter (more canonical) names
    return a.length - b.length;
};

const getLatestFlashModel = async (apiKey) => {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`, {
        method: 'GET'
    });

    if (!res.ok) {
        const errText = await res.text();
        throw new Error(`모델 목록 조회 실패 (HTTP ${res.status}): ${errText}`);
    }

    const data = await res.json();
    const models = (data.models || []).map(m => (m.name || '').replace('models/', '')).filter(Boolean);

    // Prefer flash, exclude preview/experimental by default
    const flashModels = models.filter(name =>
        name.includes('flash') &&
        !name.includes('preview') &&
        !name.includes('experimental')
    );

    if (flashModels.length === 0) {
        // Fallback: allow preview if that's all the key can access
        const flashAny = models.filter(name => name.includes('flash'));
        if (flashAny.length === 0) {
            throw new Error('이 API 키로 접근 가능한 flash 모델을 찾지 못했습니다.');
        }
        flashAny.sort(compareVersionTupleDesc);
        return flashAny[0];
    }

    flashModels.sort(compareVersionTupleDesc);
    return flashModels[0];
};

const getLatestFlashModelCached = async (apiKey) => {
    const cached = localStorage.getItem(MODEL_CACHE_KEY);
    const cachedAt = parseInt(localStorage.getItem(MODEL_CACHE_AT_KEY) || '0', 10);

    if (cached && cachedAt && (Date.now() - cachedAt) < MODEL_CACHE_TTL_MS) {
        return cached;
    }

    const latest = await getLatestFlashModel(apiKey);
    localStorage.setItem(MODEL_CACHE_KEY, latest);
    localStorage.setItem(MODEL_CACHE_AT_KEY, String(Date.now()));
    return latest;
};

const setModelLabel = (modelName) => {
    state.modelName = modelName;
    if (els.modelName) els.modelName.textContent = modelName || '-';
};

            // --- 2. AI Parsing Logic (Gemini API) ---
            const parseWithGemini = async () => {
                const text = els.input.value.trim();
                const apiKey = els.apiKeyInput.value.trim();

                if (!apiKey) {
                    alert('Gemini API 키를 입력해주세요.');
                    els.apiKeyInput.focus();
                    return;
                }
                if (!text) {
                    alert('변환할 텍스트를 입력해주세요.');
                    els.input.focus();
                    return;
                }

                state.apiKey = apiKey;
                localStorage.setItem('gemini_api_key', apiKey);
                setLoading(true);

                const currentYear = new Date().getFullYear();
                const prompt = `
                    Context: You are a data parsing assistant.
                    Goal: Parse the user's unstructured work log text into a strictly formatted JSON array.
                    Current Year: ${currentYear} (Use this year if year is missing in input)
                    
                    Input Text:
                    """
                    ${text}
                    """

                    Requirements:
                    1. Identify dates and time ranges. Handle formats like "10,22", "10/22", "10월 22일".
                    2. Handle time formats like "11:30", "14:00", "2pm".
                    3. Group multiple sessions for the same date into one object.
                    4. Calculate 'durationMinutes' for each session.
                    5. Calculate 'totalMinutes' for the day.
                    6. Identify the Day of the Week (Monday, Tuesday...) for each date.
                    7. Sort by date ascending.
                    8. Output strictly valid JSON only. No markdown code blocks, no explanations.

                    Output JSON Structure:
                    [
                      {
                        "date": "YYYY-MM-DD",
                        "dayOfWeek": "Korean string (e.g. '월', '화', '수')",
                        "sessions": [
                          { "start": "HH:MM", "end": "HH:MM", "durationMinutes": number, "note": "optional text if present" }
                        ],
                        "totalMinutes": number
                      }
                    ]
                `;

                try {
                    const modelName = await getLatestFlashModelCached(apiKey);
                    setModelLabel(modelName);

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.1 }
                        })
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP ${response.status} - ${errText}`);
                    }

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    if (!data.candidates || !data.candidates.length) throw new Error('AI 응답이 비어 있습니다.');

                    let rawText = data.candidates[0].content.parts[0].text || '';

                    // If the model wraps JSON in markdown or adds text, extract the first JSON array/object block.
                    rawText = rawText.replace(/^```json\s*/i, '').replace(/\s*```\s*$/i, '').trim();

                    const jsonMatch = rawText.match(/(\[[\s\S]*\]|\{[\s\S]*\})/);
                    const jsonText = (jsonMatch ? jsonMatch[1] : rawText).trim();

                    state.parsedData = JSON.parse(jsonText);
                    
                    // 기본 뷰를 '차트'로 전환하거나 유지
                    render();

                } catch (error) {
                    console.error('AI Parsing Error:', error);
                    els.outputContainer.innerHTML = `<div class="error-msg">
                        <strong>오류 발생:</strong><br>${error.message}<br><br>
                        API 키가 올바른지 확인하거나, 입력 형식을 조금 더 명확하게 수정해보세요.
                    </div>`;
                } finally {
                    setLoading(false);
                }
            };

            const setLoading = (isLoading) => {
                state.isLoading = isLoading;
                if (isLoading) {
                    els.loadingOverlay.classList.remove('hidden');
                    els.convertBtn.disabled = true;
                    els.convertBtn.innerHTML = '<span>분석 중...</span>';
                } else {
                    els.loadingOverlay.classList.add('hidden');
                    els.convertBtn.disabled = false;
                    els.convertBtn.innerHTML = '<span>AI 변환 실행</span>';
                }
            };

            // --- 3. Rendering ---
            const render = () => {
                const { parsedData, currentView } = state;

                if (!parsedData) return;
                if (parsedData.length === 0) {
                    els.outputContainer.innerHTML = `<div style="padding:2rem;text-align:center;">분석된 데이터가 없습니다.</div>`;
                    return;
                }

                // Destroy existing chart if leaving chart view or re-rendering
                if (state.chartInstance) {
                    state.chartInstance.destroy();
                    state.chartInstance = null;
                }

                if (currentView === 'json') {
                    renderJSON();
                } else if (currentView === 'table') {
                    renderTable();
                } else if (currentView === 'chart') {
                    renderChart();
                }
            };

            const renderJSON = () => {
                const jsonString = JSON.stringify(state.parsedData, null, 2);
                els.outputContainer.innerHTML = `<div class="json-output">${escapeHtml(jsonString)}</div>`;
            };

            const renderTable = () => {
                // 총 근무시간 합계 계산
                const grandTotalMinutes = state.parsedData.reduce((sum, item) => sum + item.totalMinutes, 0);

                const html = `
                    <div style="padding: 1rem;">
                        <div class="total-summary">
                            총 근무 시간 합계: ${formatMinutes(grandTotalMinutes)}
                        </div>
                        <table class="table-view">
                            <thead>
                                <tr>
                                    <th style="width: 140px">날짜</th>
                                    <th>세션 정보 (시간 / 메모)</th>
                                    <th style="width: 100px">일일 합계</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${state.parsedData.map(item => `
                                    <tr>
                                        <td>
                                            ${item.date} 
                                            <span class="day-badge">(${item.dayOfWeek || '-'})</span>
                                        </td>
                                        <td>
                                            ${item.sessions.map(s => 
                                                `<div class="tag">
                                                    ${s.start} ~ ${s.end} (${formatMinutes(s.durationMinutes)})
                                                    ${s.note ? `<span style="color:#666; font-size:0.75rem;">| ${s.note}</span>` : ''}
                                                </div>`
                                            ).join('')}
                                        </td>
                                        <td style="font-weight:bold; color:var(--primary);">
                                            ${formatMinutes(item.totalMinutes)}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                els.outputContainer.innerHTML = html;
            };

            const renderChart = () => {
                // 총 근무시간 합계 계산
                const grandTotalMinutes = state.parsedData.reduce((sum, item) => sum + item.totalMinutes, 0);

                els.outputContainer.innerHTML = `
                    <div class="chart-container">
                        <div class="total-summary">
                            🎉 총 근무 시간: ${formatMinutes(grandTotalMinutes)}
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="workChart"></canvas>
                        </div>
                    </div>
                `;

                const ctx = document.getElementById('workChart').getContext('2d');
                
                // 데이터 준비: 라벨에 요일 추가
                const labels = state.parsedData.map(d => `${d.date} (${d.dayOfWeek || ''})`);
                const dataMinutes = state.parsedData.map(d => d.totalMinutes);
                const dataHours = dataMinutes.map(m => (m / 60).toFixed(1)); // 시간 단위로 변환

                state.chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '근무 시간 (시간)',
                            data: dataHours,
                            backgroundColor: 'rgba(59, 130, 246, 0.6)', // Primary color
                            borderColor: 'rgb(37, 99, 235)',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const rawMinutes = dataMinutes[context.dataIndex];
                                        return `${formatMinutes(rawMinutes)} (${context.raw}시간)`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: {
                                    display: true,
                                    text: '시간 (Hours)'
                                }
                            }
                        }
                    }
                });
            };

            const formatMinutes = (mins) => {
                const h = Math.floor(mins / 60);
                const m = mins % 60;
                if (h > 0) return `${h}시간 ${m}분`;
                return `${m}분`;
            };

            const escapeHtml = (str) => {
                return str.replace(/[&<>"']/g, m => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                })[m]);
            };

            // --- 4. Event Listeners ---
            const bindEvents = () => {
                els.convertBtn.addEventListener('click', parseWithGemini);

                els.apiKeyInput.addEventListener('change', (e) => {
                    state.apiKey = e.target.value;
                    localStorage.setItem('gemini_api_key', e.target.value);

                    // API 키가 바뀌면 모델 캐시를 무효화(키별 권한이 달라질 수 있음)
                    localStorage.removeItem(MODEL_CACHE_KEY);
                    localStorage.removeItem(MODEL_CACHE_AT_KEY);
                    setModelLabel('');
                });

                els.tabs.forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        els.tabs.forEach(t => t.classList.remove('active'));
                        e.target.classList.add('active');
                        state.currentView = e.target.dataset.view;
                        render();
                    });
                });

                els.copyBtn.addEventListener('click', () => {
                    if (!state.parsedData) return;
                    // 차트 뷰에서는 복사가 애매하므로 JSON을 복사하도록 함
                    const textToCopy = JSON.stringify(state.parsedData, null, 2);
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        const originalText = els.copyBtn.innerText;
                        els.copyBtn.innerText = "JSON 복사됨!";
                        setTimeout(() => els.copyBtn.innerText = originalText, 2000);
                    });
                });

                els.clearBtn.addEventListener('click', () => {
                    els.input.value = '';
                    els.input.focus();
                });
            };

            return { init };
        })();

        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
